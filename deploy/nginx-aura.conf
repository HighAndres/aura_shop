# nginx del HOST para Aura. Colócalo en /etc/nginx/sites-available/aura
# y enlázalo a sites-enabled. Luego ejecuta:
#   sudo certbot --nginx -d aura.mirmiapps.com
# (certbot añade el bloque 443 con SSL automáticamente y redirige 80 -> 443).
#
# Ajusta server_name a tu subdominio real.

server {
    listen 80;
    server_name aura.mirmiapps.com;

    client_max_body_size 10m;

    # API, docs y health -> backend (contenedor en localhost:8000)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /redoc {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Todo lo demás -> frontend Next.js (contenedor en localhost:3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
